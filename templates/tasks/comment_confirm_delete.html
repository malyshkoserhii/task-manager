{% extends "base.html" %}

{% block content %}
  <div class="max-w-2xl mx-auto px-4 py-8">
    <div class="bg-white border border-gray-200 rounded-2xl p-6 shadow-xs">

      <div class="flex items-center space-x-2 mb-4 border-b border-gray-100 pb-4">
        <span class="text-xl">🗑️</span>
        <h2 class="text-lg font-bold text-gray-900">Delete Comment</h2>
      </div>

      <p class="text-sm text-gray-600 mb-6">
        Are you sure you want to delete this comment? This action cannot be undone.
      </p>

      <form method="post" action="">
        {% csrf_token %}
        <div class="flex justify-end space-x-2">
          <button type="button" onclick="history.back()"
                  class="px-4 py-2 border border-gray-200 bg-white hover:bg-gray-50 text-gray-700 text-xs font-semibold rounded-lg transition duration-150">
            Cancel
          </button>

          <button type="submit"
                  class="px-4 py-2 bg-red-600 text-white text-xs font-semibold rounded-lg hover:bg-red-700 shadow-xs transition duration-150">
            Delete
          </button>
        </div>
      </form>

    </div>
  </div>
{% endblock %}
