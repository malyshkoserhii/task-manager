{% extends "base.html" %}

{% block content %}
  <div class="max-w-md mx-auto sm:px-6 lg:px-8 py-16 text-center">

    <div
        class="mx-auto flex h-14 w-14 items-center justify-center rounded-xl bg-red-50 border border-red-100 text-red-600 text-xl mb-5 shadow-xs">
      🗑️
    </div>

    <h1 class="text-2xl font-bold text-gray-950 tracking-tight">Delete "{{ object.name }}"?</h1>
    <p class="text-sm text-gray-500 mt-2 max-w-sm mx-auto leading-relaxed">
      Are you absolute sure you want to delete this team? This action is <span class="font-semibold text-red-600">permanent</span>
      and cannot be undone. All shared configurations for this team will be wiped.
    </p>

    <div class="mt-8 bg-white border border-gray-200 rounded-2xl p-6 shadow-xs">
      <form action="{% url 'tasks:team-delete' pk=object.id %}" method="post" class="flex flex-col gap-3">
        {% csrf_token %}

        <button type="submit"
                class="inline-flex items-center justify-center px-5 py-2.5 bg-red-600 hover:bg-red-700 text-white font-medium text-sm rounded-xl shadow-xs hover:shadow-md transition-all duration-150 active:scale-98 cursor-pointer w-full">
          Yes, Delete Permanently
        </button>

        <a href="{% url 'tasks:team-update' pk=object.id %}"
           class="inline-flex items-center justify-center px-4 py-2.5 border border-gray-200 hover:bg-gray-50 text-gray-700 font-medium text-sm rounded-xl transition-colors duration-150 w-full">
          Cancel
        </a>
      </form>
    </div>

  </div>
{% endblock %}
