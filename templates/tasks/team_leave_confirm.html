{% extends "base.html" %}

{% block content %}
  <div class="max-w-md mx-auto sm:px-6 lg:px-8 py-16 text-center">
    <div
        class="mx-auto flex h-14 w-14 items-center justify-center rounded-full bg-amber-50 border border-amber-200 text-amber-600 text-2xl mb-4">
      ⚠️
    </div>

    <h1 class="text-2xl font-bold text-gray-950 tracking-tight">Leave {{ object.name }}?</h1>
    <p class="text-sm text-gray-500 mt-2 max-w-sm mx-auto">
      Are you sure you want to leave this team? You will immediately lose access to all projects, tasks, and discussions
      associated with this cohort.
    </p>

    <div class="mt-8 bg-white border border-gray-200 rounded-2xl p-6 shadow-xs">
      <form action="{% url 'tasks:team-leave' pk=object.id %}" method="post" class="flex flex-col gap-3">
        {% csrf_token %}

        <button type="submit"
                class="inline-flex items-center justify-center px-5 py-2.5 bg-red-600 hover:bg-red-700 text-white font-medium text-sm rounded-xl shadow-xs hover:shadow-md transition-all active:scale-98 cursor-pointer w-full">
          Yes, Leave Team
        </button>

        <a href="{% url 'tasks:team-update' pk=object.id %}"
           class="inline-flex items-center justify-center px-4 py-2.5 border border-gray-200 hover:bg-gray-50 text-gray-700 font-medium text-sm rounded-xl transition-colors w-full">
          Cancel
        </a>
      </form>
    </div>

  </div>
{% endblock %}
