{% extends "base.html" %}

{% block title %}Page Not Found (404) — Task Manager{% endblock %}

{% block content %}
<div class="max-w-md mx-auto py-16 px-4 text-center space-y-6 flex flex-col items-center justify-center min-h-[500px]">

  <div class="space-y-2">
    <h1 class="text-8xl font-extrabold text-indigo-600 tracking-tighter drop-shadow-xs">404</h1>
    <h2 class="text-2xl font-bold text-gray-950 tracking-tight">Lost in Space? 🐱</h2>
  </div>

  <p class="text-base text-gray-500 leading-relaxed max-w-sm">
    The page you are looking for doesn't exist or has been moved. Don't worry, our tech cat is on the case!
  </p>

  <div class="pt-4">
    <a
      href="{% url 'tasks:project-list' %}"
      class="inline-flex items-center gap-2 bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-medium py-3 px-6 rounded-xl shadow-xs transition-all duration-200 hover:shadow-md active:scale-98 cursor-pointer"
    >
      <span>📂</span>
      <span>Go to Projects List</span>
    </a>
  </div>

</div>
{% endblock %}
