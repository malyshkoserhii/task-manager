{% extends "base.html" %}

{% block title %}Password Changed Successfully — Task Manager{% endblock %}

{% block content %}
  <div class="max-w-md mx-auto bg-white p-8 rounded-2xl shadow-sm border border-gray-100 mt-10 text-center space-y-5">

    <div
        class="w-16 h-16 bg-green-50 text-green-500 rounded-full flex items-center justify-center text-2xl mx-auto border border-green-100">
      ✅
    </div>

    <div class="space-y-1.5">
      <h2 class="text-2xl font-bold text-gray-950 tracking-tight">Password Changed!</h2>
      <p class="text-sm text-gray-500 leading-relaxed">
        Your password has been updated successfully. You can now continue using the application securely.
      </p>
    </div>

    <div class="pt-2">
      <a
          href="{% url 'tasks:project-list' %}"
          class="inline-flex items-center justify-center bg-gray-900 hover:bg-gray-800 text-white text-sm font-medium py-2.5 px-5 rounded-xl transition-all active:scale-98 cursor-pointer"
      >
        Go to My Projects
      </a>
    </div>
  </div>
{% endblock %}
